replicaCount: 2
environment: ""

image:
  repository: ravelox/wotlwedu-browser
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80

resources: {}

affinity: {}
nodeSelector: {}
tolerations: []

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: browser.wotlwedu.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wotlwedu-browser-tls
      hosts:
        - browser.wotlwedu.com

environments: {}
# Example:
# environments:
#   dev:
#     service:
#       type: NodePort
#       port: 8080
#     ingress:
#       enabled: true
#       hosts:
